{{ define "main" }}
<main class="w-screen h-screen flex">{{ .Content }}</main>

{{- with resources.Get "js/tools/editor/index.js" }}
{{- if hugo.IsDevelopment }}
<script src="{{ .RelPermalink }}"></script>
{{- else }}
{{- with . | minify | fingerprint }}
<script
    src="{{ .RelPermalink }}"
    integrity="{{ .Data.Integrity }}"
    crossorigin="anonymous"
></script>
{{- end }}
{{- end }}
{{- end }}

{{ end }}
